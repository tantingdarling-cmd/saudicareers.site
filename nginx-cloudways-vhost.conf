# ══════════════════════════════════════════════════════════════════
# Cloudways Nginx Vhost — SaudiCareers
#
# الصق هذا في: Cloudways > Application > Application Settings > Vhost
# ══════════════════════════════════════════════════════════════════

# ── NEW: Gzip Compression ───────────────────────────────────────
# يُقلّل حجم الـ JS/CSS/JSON بنسبة 60-80% → أسرع تحميلاً
# يُوضع خارج location blocks (على مستوى server{} أو يُضاف من Cloudways Global)
gzip            on;
gzip_vary       on;
gzip_min_length 1024;
gzip_proxied    any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    image/svg+xml;

# NOTE: http2_push /assets/index-*.js — NOT SUPPORTED
# Nginx http2_push requires exact static paths, not glob patterns.
# Vite produces content-hashed filenames (index-C6nCLtmE.js) that change
# on every build, making static push directives impossible without a
# build-time injection step. Use <link rel="preload"> in index.html instead.

# ── 1. طلبات /api → Laravel (backend/public/) ──────────────────
# §13: اسم التطبيق gaczagbrjk / مسار PHP sock ثابت
location /api {
    alias /home/1600726.cloudwaysapps.com/gaczagbrjk/public_html/backend/public;

    try_files $uri $uri/ @laravel;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $request_filename;
        include fastcgi_params;
    }
}

location @laravel {
    fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME /home/1600726.cloudwaysapps.com/gaczagbrjk/public_html/backend/public/index.php;
    include fastcgi_params;
}

# ── 2. /storage → Laravel storage symlink ──────────────────────
location /storage {
    alias /home/1600726.cloudwaysapps.com/gaczagbrjk/public_html/backend/public/storage;
    try_files $uri $uri/ =404;
}

# ── 3. ملفات ثابتة — §11 Gotcha #2: يجب أن يأتي قبل location / ─
# بدون هذا الـ block، ملفات JS/CSS تذهب لـ PHP-FPM → Content-Type: text/html
# → browser يرفض تنفيذها كـ module script → شاشة بيضاء
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp|webmanifest|xml|txt)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

# ── 4. صفحات الوظائف + OG Images → Laravel (Hybrid SEO) ────────
# يضمن أن Bots (Google، WhatsApp، Twitter) ترى HTML كامل مع meta فورياً
# React تتولى التفاعل بعد التحميل — لا تغيير في تجربة المستخدم
#
# يجب أن يأتي هذا الـ block قبل location / لأن regex يتفوق على prefix
location ~ ^/(jobs|og)(/.*)?$ {
    try_files $uri @laravel;
}

# ── 5. كل الباقي → React SPA fallback ──────────────────────────
# §2: يُعيد index.html لكل route غير موجود (hard refresh على /admin إلخ.)
location / {
    try_files $uri $uri/ /index.html;
}
