<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaudiCareers · Marketing UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg-page); color: var(--fg-primary); }
  body { font-family: var(--font-ar); line-height: 1.75; -webkit-font-smoothing: antialiased; }
  @keyframes float { 0%,100%{transform:translateY(0) rotate(-1deg)} 50%{transform:translateY(-12px) rotate(1deg)} }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(59,175,122,0.55);transform:scale(1)} 50%{box-shadow:0 0 0 6px rgba(59,175,122,0);transform:scale(1.15)} }
  @keyframes heroFloat { 0%,100%{transform:translateY(0) rotate(-1.5deg)} 50%{transform:translateY(-8px) rotate(-0.5deg)} }
  @keyframes heroBadge1 { 0%,100%{transform:translate(0,0) rotate(-4deg)} 50%{transform:translate(-6px,-10px) rotate(2deg)} }
  @keyframes heroBadge2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(8px,-12px)} }
  @keyframes heroBadge3 { 0%,100%{transform:translate(0,0) rotate(-2deg)} 50%{transform:translate(0,-8px) rotate(1deg)} }
  @keyframes heroSpark { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.6);opacity:0.5} }
  /* 4 صور × 3.5s تأخير = دورة 14s. كل صورة: ظهور 5%→25%، ثبات حتى 25%، اختفاء بطيء 25%→30%، مخفية لبقية الدورة */
  @keyframes heroResumeCycle { 0%{opacity:0} 3%{opacity:1} 25%{opacity:1} 28%{opacity:0} 100%{opacity:0} }
  /* Job badge glow — gentle pulsing halo, tinted per badge type */
  @keyframes badgeGlow-hot { 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.45),0 0 0 0 rgba(220,38,38,0)} 50%{box-shadow:0 0 0 4px rgba(220,38,38,0.12),0 0 14px 2px rgba(220,38,38,0.35)} }
  @keyframes badgeGlow-new { 0%,100%{box-shadow:0 0 0 0 rgba(197,160,89,0.55),0 0 0 0 rgba(197,160,89,0)} 50%{box-shadow:0 0 0 4px rgba(197,160,89,0.14),0 0 16px 3px rgba(197,160,89,0.45)} }
  @keyframes badgeGlow-featured { 0%,100%{box-shadow:0 0 0 0 rgba(59,175,122,0.55),0 0 0 0 rgba(59,175,122,0)} 50%{box-shadow:0 0 0 4px rgba(59,175,122,0.14),0 0 16px 3px rgba(59,175,122,0.45)} }
  @media (max-width:860px){ .sc-desk{display:none!important} .hero-grid{grid-template-columns:1fr!important} .hero-grid > *:last-child{order:-1} }
  @media (prefers-reduced-motion: reduce){ *,*::before,*::after{animation-duration:0.001s!important;animation-iteration-count:1!important} }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="./Navbar.jsx"></script>
<script type="text/babel" src="./Hero.jsx"></script>
<script type="text/babel" src="./JobsSection.jsx"></script>
<script type="text/babel" src="./SectionsRest.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  function App() {
    const [apply, setApply] = useState(null);
    return (
      <>
        <Navbar />
        <Hero />
        <StatsBar />
        <JobsSection onApply={setApply} />
        <ServicesSection />
        <HowItWorks />
        <TipsSection />
        <SignupCTA />
        <Footer />
        <ApplySheet job={apply} onClose={() => setApply(null)} />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
