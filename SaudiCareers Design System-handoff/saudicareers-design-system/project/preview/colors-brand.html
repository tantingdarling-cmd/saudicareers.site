<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--bg-page);font-family:var(--font-ar);color:var(--fg-primary)}
.card{padding:24px;background:var(--white);min-height:150px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.sw{display:flex;flex-direction:column;gap:6px;min-width:0}
.chip{width:100%;aspect-ratio:2.2/1;border-radius:10px;border:1px solid rgba(0,0,0,0.06)}
.lbl{font-family:var(--font-en);font-size:10px;font-weight:700;color:var(--fg-primary);letter-spacing:0.2px}
.hex{font-family:var(--font-en);font-size:10px;color:var(--fg-muted);text-transform:uppercase}
.ttl{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold600);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ttl::before{content:"";width:22px;height:2px;background:var(--gold500);border-radius:2px}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;margin-bottom:16px}
.grid .sw:nth-child(n+11){display:none}
</style></head><body><div class="card">
<div class="ttl">Brand Greens — g-scale</div>
<div class="grid">
<div class="sw"><div class="chip" style="background:#001a0d"></div><div class="lbl">g950</div><div class="hex">#001A0D</div></div>
<div class="sw"><div class="chip" style="background:#003D2B"></div><div class="lbl">g900 ★</div><div class="hex">#003D2B</div></div>
<div class="sw"><div class="chip" style="background:#004D33"></div><div class="lbl">g800</div><div class="hex">#004D33</div></div>
<div class="sw"><div class="chip" style="background:#006644"></div><div class="lbl">g700</div><div class="hex">#006644</div></div>
<div class="sw"><div class="chip" style="background:#1B7A52"></div><div class="lbl">g600</div><div class="hex">#1B7A52</div></div>
<div class="sw"><div class="chip" style="background:#238C5E"></div><div class="lbl">g500</div><div class="hex">#238C5E</div></div>
<div class="sw"><div class="chip" style="background:#3AAF7A"></div><div class="lbl">g400</div><div class="hex">#3AAF7A</div></div>
<div class="sw"><div class="chip" style="background:#A8D5BC"></div><div class="lbl">g200</div><div class="hex">#A8D5BC</div></div>
<div class="sw"><div class="chip" style="background:#D4EDE0"></div><div class="lbl">g100</div><div class="hex">#D4EDE0</div></div>
<div class="sw"><div class="chip" style="background:#EDF7F2"></div><div class="lbl">g50</div><div class="hex">#EDF7F2</div></div>
</div>
<div class="ttl" style="color:#A67C1A">Gold Accent — premium signals</div>
<div class="grid">
<div class="sw"><div class="chip" style="background:#8B6914"></div><div class="lbl">gold700</div><div class="hex">#8B6914</div></div>
<div class="sw"><div class="chip" style="background:#A67C1A"></div><div class="lbl">gold600</div><div class="hex">#A67C1A</div></div>
<div class="sw"><div class="chip" style="background:#C5A059"></div><div class="lbl">gold500 ★</div><div class="hex">#C5A059</div></div>
<div class="sw"><div class="chip" style="background:#D4B478"></div><div class="lbl">gold400</div><div class="hex">#D4B478</div></div>
<div class="sw"><div class="chip" style="background:#E8CFA0"></div><div class="lbl">gold300</div><div class="hex">#E8CFA0</div></div>
<div class="sw"><div class="chip" style="background:#FAF3E0"></div><div class="lbl">gold100</div><div class="hex">#FAF3E0</div></div>
</div>
</div></body></html>
