<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--bg-page);font-family:var(--font-ar)}
.card{padding:22px;background:var(--white);min-height:150px;display:flex;gap:28px;align-items:flex-end;flex-wrap:wrap}
.box{display:flex;flex-direction:column;align-items:center;gap:6px}
.r{background:var(--g50);border:1.5px solid var(--g200)}
.lbl{font-family:var(--font-en);font-size:10px;font-weight:700;color:var(--fg-primary)}
.val{font-family:var(--font-en);font-size:10px;color:var(--fg-muted)}
.ttl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold600);width:100%;display:flex;align-items:center;gap:8px;margin-bottom:2px}
.ttl::before{content:"";width:22px;height:2px;background:var(--gold500);border-radius:2px}
</style></head><body><div class="card">
<div class="ttl">Radii ramp</div>
<div class="box"><div class="r" style="width:64px;height:40px;border-radius:8px"></div><div class="lbl">r-sm</div><div class="val">8px · btn</div></div>
<div class="box"><div class="r" style="width:64px;height:40px;border-radius:12px"></div><div class="lbl">r-md</div><div class="val">12px · btn</div></div>
<div class="box"><div class="r" style="width:64px;height:40px;border-radius:18px"></div><div class="lbl">r-lg</div><div class="val">18px · card</div></div>
<div class="box"><div class="r" style="width:64px;height:40px;border-radius:24px"></div><div class="lbl">r-xl</div><div class="val">24px · form</div></div>
<div class="box"><div class="r" style="width:88px;height:32px;border-radius:50px"></div><div class="lbl">pill</div><div class="val">50px · chip</div></div>
</div></body></html>
