<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--bg-page);font-family:var(--font-ar)}
.card{padding:30px 24px;background:var(--white);min-height:150px;display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.box{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;min-width:120px}
.sw{width:100%;max-width:140px;height:56px;background:var(--white);border-radius:12px}
.sm{box-shadow:0 1px 4px rgba(0,61,43,0.08)}
.md{box-shadow:0 4px 16px rgba(0,61,43,0.10)}
.lg{box-shadow:0 12px 40px rgba(0,61,43,0.14)}
.gold{box-shadow:0 4px 20px rgba(197,160,89,0.3);background:var(--gold500)}
.lbl{font-family:var(--font-en);font-size:10px;font-weight:700;color:var(--fg-primary)}
.val{font-family:var(--font-en);font-size:9px;color:var(--fg-muted);text-align:center;line-height:1.4}
</style></head><body><div class="card">
<div class="box"><div class="sw sm"></div><div class="lbl">shadow-sm</div><div class="val">nav on scroll<br>rgba(0,61,43,.08)</div></div>
<div class="box"><div class="sw md"></div><div class="lbl">shadow-md</div><div class="val">card rest<br>rgba(0,61,43,.10)</div></div>
<div class="box"><div class="sw lg"></div><div class="lbl">shadow-lg</div><div class="val">card hover / modal<br>rgba(0,61,43,.14)</div></div>
<div class="box"><div class="sw gold"></div><div class="lbl">shadow-gold</div><div class="val">gold CTA glow<br>rgba(197,160,89,.3)</div></div>
</div></body></html>
