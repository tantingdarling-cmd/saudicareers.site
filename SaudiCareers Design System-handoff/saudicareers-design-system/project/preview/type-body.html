<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--bg-page);font-family:var(--font-ar)}
.card{padding:24px 28px;background:var(--white);min-height:150px}
.row{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px dashed var(--gray200)}
.row:last-child{border:none}
.name{font-family:var(--font-en);font-size:10px;font-weight:700;color:var(--fg-subtle);text-transform:uppercase;letter-spacing:1px;width:80px;flex-shrink:0}
.spec{font-family:var(--font-en);font-size:10px;color:var(--fg-muted);margin-right:auto;white-space:nowrap}
.eb{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold600)}
.eb::before{content:"";width:22px;height:2px;background:var(--gold500);border-radius:2px;display:block}
.brand{font-family:var(--font-en);font-weight:700;font-size:17px;color:var(--g900)}
.brand i{color:var(--gold500);font-style:normal}
</style></head><body><div class="card">
<div class="row"><span class="name">Body</span><span style="font-size:14px;color:var(--gray600);line-height:1.75">نجمع الفرص الوظيفية من مصادرها الرسمية ونتحقق قبل نشرها</span><span class="spec">400 · 14px · 1.75lh</span></div>
<div class="row"><span class="name">Meta</span><span style="font-size:13px;color:var(--gray400)">منذ 3 أيام · الرياض</span><span class="spec">400 · 13px</span></div>
<div class="row"><span class="name">Eyebrow</span><span class="eb">فرص موثوقة</span><span class="spec">700 · 11px · +1.5px</span></div>
<div class="row"><span class="name">Brand</span><span class="brand">Saudi<i>Careers</i></span><span class="spec">Plus Jakarta · 700 · 17px</span></div>
<div class="row"><span class="name">Stat</span><span style="font-family:var(--font-en);font-weight:800;font-size:32px;color:var(--g900);line-height:1">2.0م<span style="color:var(--gold500)">+</span></span><span class="spec">Plus Jakarta · 800</span></div>
</div></body></html>
