<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--bg-page);font-family:var(--font-ar)}
.card{padding:26px;background:var(--white);min-height:150px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.b{font-size:12px;font-weight:600;padding:5px 13px;border-radius:50px;display:inline-flex;gap:6px;align-items:center;white-space:nowrap}
.hot{background:rgba(220,38,38,0.08);color:#B91C1C;border:1px solid rgba(220,38,38,0.15)}
.new{background:#FAF3E0;color:#8B6914;border:1px solid rgba(197,160,89,0.25)}
.feat{background:#EDF7F2;color:#006644;border:1px solid #A8D5BC}
.match{background:#D1FAE5;color:#065F46;font-weight:700}
.pdpl{background:#EDF7F2;color:#006644;border:1px solid #A8D5BC}
.pill{background:var(--white);border:1px solid var(--gray200);padding:5px 14px 5px 12px;border-radius:50px;font-size:13px;font-weight:500;color:var(--g800);display:inline-flex;align-items:center;gap:8px;box-shadow:0 1px 4px rgba(0,61,43,0.06)}
.dot{width:7px;height:7px;background:var(--g600);border-radius:50%;display:block}
.star{background:rgba(197,160,89,0.15);border:1px solid rgba(197,160,89,0.35);color:#D4B478;padding:3px 12px;border-radius:50px;font-size:11px;font-weight:700;letter-spacing:.5px}
.eb{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold600)}
.eb::before{content:"";width:22px;height:2px;background:var(--gold500);border-radius:2px;display:block}
</style></head><body><div class="card">
<span class="b hot">مطلوبة</span>
<span class="b new">جديدة</span>
<span class="b feat">حصرية</span>
<span class="b match">🏆 مطابقة ممتازة</span>
<span class="b pdpl">🔒 PDPL ✓</span>
<span class="pill"><span class="dot"></span> وصول مبكر مجاني — سجّل الآن</span>
<span class="star">★ الخدمة الرئيسية</span>
<span class="eb">فرص موثوقة</span>
</div></body></html>
