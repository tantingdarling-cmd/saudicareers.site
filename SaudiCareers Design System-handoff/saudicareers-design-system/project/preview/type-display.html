<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--bg-page);font-family:var(--font-ar)}
.card{padding:26px 28px;background:var(--white);min-height:150px}
.row{display:flex;align-items:baseline;gap:14px;padding:10px 0;border-bottom:1px dashed var(--gray200)}
.row:last-child{border:none}
.name{font-family:var(--font-en);font-size:10px;font-weight:700;color:var(--fg-subtle);text-transform:uppercase;letter-spacing:1px;width:60px;flex-shrink:0}
.spec{font-family:var(--font-en);font-size:10px;color:var(--fg-muted);margin-right:auto;white-space:nowrap}
</style></head><body><div class="card">
<div class="row"><span class="name">Hero</span><span style="font-size:36px;font-weight:700;color:var(--g950);letter-spacing:-0.5px;line-height:1.1">ارفع مستواك في سوق العمل</span><span class="spec">IBM Plex Arabic · 700 · clamp→3.8rem</span></div>
<div class="row"><span class="name">H2</span><span style="font-size:26px;font-weight:700;color:var(--g950);line-height:1.25">أحدث الوظائف في السوق السعودي</span><span class="spec">700 · clamp→2.4rem</span></div>
<div class="row"><span class="name">H3</span><span style="font-size:18px;font-weight:700;color:var(--g950)">مطور واجهات أمامية</span><span class="spec">700 · 1.125rem</span></div>
<div class="row"><span class="name">Lead</span><span style="font-size:16px;color:var(--gray600);line-height:1.85;font-weight:500">نجمع الفرص من مصادرها الرسمية ونتحقق من صحتها</span><span class="spec">500 · 1rem</span></div>
</div></body></html>
