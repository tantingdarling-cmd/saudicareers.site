<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:linear-gradient(180deg,#F5F5F7 0%,#EDF7F2 100%);font-family:var(--font-ar);min-height:150px}
.card{padding:0;background:transparent;min-height:150px;display:flex;flex-direction:column;gap:12px;padding:14px}
.nav{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(255,255,255,0.82);backdrop-filter:blur(15px) saturate(180%);border:1px solid var(--gray200);border-radius:14px;box-shadow:0 4px 16px rgba(0,61,43,0.10)}
.brand{display:flex;align-items:center;gap:8px}
.logo{width:36px;height:36px;border-radius:50%;object-fit:cover;display:block}
.wm{font-family:var(--font-en);font-weight:700;font-size:15px;color:#003D2B}
.wm em{color:#C5A059;font-style:normal}
.links{display:flex;gap:2px}
.links button{border:none;background:transparent;font-size:13px;font-weight:500;color:#4A6358;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:inherit}
.cta{background:#C5A059;color:#001a0d;border:none;padding:7px 16px;border-radius:50px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.lbl{font-family:var(--font-en);font-size:9px;color:var(--fg-subtle);text-transform:uppercase;letter-spacing:1px;margin-right:4px}
</style></head><body><div class="card">
<div class="lbl">Glass nav · at rest (0.72 opacity)</div>
<div class="nav" style="background:rgba(255,255,255,0.72);box-shadow:none"><div class="brand"><img class="logo" src="../assets/saudi-logo.png" alt=""><div class="wm">Saudi<em>Careers</em></div></div><div class="links"><button>الوظائف</button><button>خدماتنا</button><button>نصائح</button><button>كيف يعمل</button></div><button class="cta">افحص سيرتك ✦</button></div>
<div class="lbl">Glass nav · scrolled (0.82 opacity + shadow)</div>
<div class="nav"><div class="brand"><img class="logo" src="../assets/saudi-logo.png" alt=""><div class="wm">Saudi<em>Careers</em></div></div><div class="links"><button>الوظائف</button><button>خدماتنا</button><button>نصائح</button><button>كيف يعمل</button></div><button class="cta">افحص سيرتك ✦</button></div>
</div></body></html>
