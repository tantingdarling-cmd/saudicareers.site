<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--bg-page);font-family:var(--font-ar)}
.card{padding:24px;background:var(--white);min-height:150px;display:flex;gap:28px;align-items:center;flex-wrap:wrap}
.block{display:flex;flex-direction:column;gap:10px;align-items:flex-start}
.lbl{font-family:var(--font-en);font-size:9px;color:var(--fg-subtle);text-transform:uppercase;letter-spacing:1px}
.wm{font-family:var(--font-en);font-weight:700;font-size:28px;color:#003D2B}
.wm em{color:#C5A059;font-style:normal}
.wm.dark{background:#001a0d;color:#fff;padding:8px 16px;border-radius:10px}
.wm.dark em{color:#D4B478}
.logo-circle{width:88px;height:88px;border-radius:50%;object-fit:cover;display:block;box-shadow:0 4px 16px rgba(0,61,43,0.10)}
.og{width:260px;height:136px;border-radius:10px;background:linear-gradient(135deg,#001a0d 0%,#003D2B 100%);position:relative;overflow:hidden;border-top:3px solid #C5A059;border-bottom:3px solid #C5A059;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#fff}
.og .t{font-family:var(--font-en);font-weight:700;font-size:18px}
.og .s{font-size:10px;color:rgba(255,255,255,.7)}
.og .u{font-family:var(--font-en);font-size:9px;color:rgba(255,255,255,.35);position:absolute;bottom:8px}
.og .flag{width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(197,160,89,0.4);background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:2px}
.div{width:40px;height:2px;background:#C5A059;border-radius:1px}
</style></head><body><div class="card">
<div class="block"><div class="lbl">Logo mark (PNG, circular)</div><img class="logo-circle" src="../assets/saudi-logo.png" alt="SaudiCareers logo"></div>
<div class="block"><div class="lbl">Wordmark · light</div><div class="wm">Saudi<em>Careers</em></div></div>
<div class="block"><div class="lbl">Wordmark · dark</div><div class="wm dark">Saudi<em>Careers</em></div></div>
<div class="block"><div class="lbl">OG image 1200×630</div>
<div class="og"><div class="flag">🇸🇦</div><div class="t">Saudi Careers</div><div class="s">طريقك للفرصة في سوق العمل السعودي</div><div class="div"></div><div class="u">saudicareers.site</div></div>
</div>
</div></body></html>
