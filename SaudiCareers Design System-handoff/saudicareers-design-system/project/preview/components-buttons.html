<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--bg-page);font-family:var(--font-ar)}
.card{padding:24px;background:var(--white);min-height:150px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.row{display:flex;gap:10px;width:100%;flex-wrap:wrap;align-items:center}
.btn{border:none;cursor:pointer;font-family:var(--font-ar);font-size:14px;font-weight:600;padding:11px 22px;border-radius:12px;transition:all .2s}
.primary{background:linear-gradient(135deg,#003D2B 0%,#001a0d 100%);color:#fff}
.gold{background:#C5A059;color:#001a0d;border-radius:50px;padding:9px 20px;font-weight:700}
.secondary{background:#fff;color:#003D2B;border:1.5px solid #D9E2DC}
.ghost{background:#EDF7F2;color:#004D33;border:1.5px solid #A8D5BC;font-size:13px;padding:11px 14px}
.chip{background:#003D2B;color:#fff;border:1.5px solid #003D2B;border-radius:50px;padding:8px 18px;font-size:13px;font-weight:500}
.chip.off{background:#fff;color:#4A6358;border-color:#D9E2DC}
.press{transform:scale(0.97)}
.lbl{font-family:var(--font-en);font-size:9px;color:var(--fg-subtle);text-transform:uppercase;letter-spacing:1px;width:100%;margin-bottom:-4px}
</style></head><body><div class="card">
<span class="lbl">Primary · Gold · Secondary</span>
<div class="row">
<button class="btn primary">افحص سيرتك مجاناً ✦</button>
<a class="btn gold">افحص سيرتك مجاناً ✦</a>
<button class="btn secondary">تصفّح الوظائف</button>
<button class="btn ghost">← التفاصيل</button>
<button class="btn primary press">pressed</button>
</div>
<span class="lbl">Filter chips (active · inactive)</span>
<div class="row">
<button class="chip">الكل</button>
<button class="chip off">تقنية</button>
<button class="chip off">مالية</button>
<button class="chip off">طاقة</button>
<button class="chip off">موارد بشرية</button>
</div>
</div></body></html>
