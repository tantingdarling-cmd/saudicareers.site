<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--bg-page);font-family:var(--font-ar)}
.wrap{padding:16px;background:var(--bg-page);min-height:150px;display:flex;gap:16px}
.jc{background:#fff;border:1.5px solid #D9E2DC;border-radius:20px;padding:20px;display:flex;flex-direction:column;width:300px;box-shadow:0 8px 32px rgba(0,0,0,0.08)}
.hover{border-color:#3AAF7A;transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,61,43,0.14)}
.top{display:flex;justify-content:space-between;margin-bottom:14px}
.co{display:flex;gap:10px;align-items:center}
.ico{width:42px;height:42px;border-radius:8px;background:#EDF7F2;border:1px solid #D4EDE0;display:flex;align-items:center;justify-content:center;font-size:20px}
.cname{font-size:13px;font-weight:600;color:#004D33}
.posted{font-size:11px;color:#8FA69A;margin-top:2px}
.badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:50px;background:#EDF7F2;color:#006644;border:1px solid #A8D5BC;white-space:nowrap;height:fit-content}
.title{font-size:15px;font-weight:700;color:#001a0d;margin-bottom:12px;line-height:1.35}
.meta{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;font-size:12px;color:#4A6358}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.tag{font-size:11px;padding:3px 9px;background:#EEF2F0;color:#4A6358;border-radius:50px}
.sal{font-size:14px;font-weight:700;color:#004D33;margin-bottom:14px}
.sal em{color:#C5A059;font-style:normal}
.actions{display:flex;gap:6px}
.apply{flex:1;padding:10px 0;background:linear-gradient(135deg,#003D2B 0%,#001a0d 100%);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
.det{padding:10px 12px;background:#EDF7F2;color:#004D33;border:1.5px solid #A8D5BC;border-radius:12px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
</style></head><body><div class="wrap">
<div class="jc">
<div class="top"><div class="co"><div class="ico">🏗️</div><div><div class="cname">نيوم</div><div class="posted">منذ يومين</div></div></div><span class="badge" style="background:rgba(220,38,38,0.08);color:#B91C1C;border-color:rgba(220,38,38,0.15)">مطلوبة</span></div>
<div class="title">مهندس بنية تحتية ذكية</div>
<div class="meta"><span>📍 تبوك</span><span>💼 دوام كامل</span></div>
<div class="tags"><span class="tag">هندسة</span><span class="tag">رؤية 2030</span><span class="tag">مشاريع كبرى</span></div>
<div class="sal"><em>●</em> 22,000 – 32,000 <span style="font-weight:400;color:#8FA69A;font-size:11px">ر.س / شهرياً</span></div>
<div class="actions"><button class="apply">← التقديم</button><button class="det">← التفاصيل</button></div>
</div>
<div class="jc hover">
<div class="top"><div class="co"><div class="ico">🏛️</div><div><div class="cname">صندوق الاستثمارات العامة</div><div class="posted">منذ يوم</div></div></div><span class="badge" style="background:#FAF3E0;color:#8B6914;border-color:rgba(197,160,89,0.25)">حصرية</span></div>
<div class="title">محلل استثماري أول</div>
<div class="meta"><span>📍 الرياض</span><span>💼 دوام كامل</span></div>
<div class="tags"><span class="tag">استثمار</span><span class="tag">CFA</span><span class="tag">إدارة المحافظ</span></div>
<div class="sal"><em>●</em> 25,000 – 40,000 <span style="font-weight:400;color:#8FA69A;font-size:11px">ر.س / شهرياً</span></div>
<div class="actions"><button class="apply">← التقديم</button><button class="det">← التفاصيل</button></div>
</div>
</div></body></html>
